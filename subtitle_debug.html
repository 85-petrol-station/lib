<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>еӯ—е№•еҠ иҪҪиҜҠж–ӯе·Ҙе…·</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    h1 {
      color: #00953d;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .section {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #444;
    }
    .section:last-child {
      border-bottom: none;
    }
    h2 {
      color: #00953d;
      margin-bottom: 12px;
      font-size: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #00953d;
      box-shadow: 0 0 0 3px rgba(0, 149, 61, 0.1);
    }
    button {
      padding: 10px 20px;
      background: #00953d;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-right: 10px;
      margin-bottom: 10px;
      transition: all 0.3s;
    }
    button:hover {
      background: #007a31;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .output {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 15px;
      margin-top: 12px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .warning { color: #facc15; }
    .info { color: #60a5fa; }
    .status-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }
    .status-table th, .status-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    .status-table th {
      background: #333;
      color: #00953d;
      font-weight: 600;
    }
    .status-ok { color: #4ade80; }
    .status-error { color: #f87171; }
    .vtt-preview {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
      font-size: 12px;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
    .vtt-line {
      margin-bottom: 8px;
      padding: 4px 0;
    }
    .vtt-timestamp {
      color: #facc15;
    }
    .vtt-en {
      color: #60a5fa;
    }
    .vtt-zh {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>рҹҺ¬ еӯ—е№•еҠ иҪҪиҜҠж–ӯе·Ҙе…·</h1>
    
    <div class="section">
      <h2>1пёҸвғЈ йҹійў‘ж–Үд»¶йҖүжӢ©</h2>
      <label for="audioSelect">йҖүжӢ©йҹійў‘ж–Үд»¶пјҡ</label>
      <select id="audioSelect">
        <option value="">-- йҖүжӢ©йҹійў‘ --</option>
        <option value="audio_1.mp3">audio_1.mp3</option>
        <option value="news_1.mp3">news_1.mp3</option>
      </select>
      <button onclick="checkAvailableFiles()">рҹ“Ӯ жЈҖжҹҘеҸҜз”Ёж–Үд»¶</button>
      <div id="fileCheckOutput" class="output" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>2пёҸвғЈ еӯ—е№•ж–Үд»¶иҜҠж–ӯ</h2>
      <label for="vttFile">еӯ—е№•ж–Үд»¶и·Ҝеҫ„пјҡ</label>
      <input type="text" id="vttFile" placeholder="e.g., audio_1.vtt">
      <button onclick="diagnoseVttFile()">рҹ”Қ иҜҠж–ӯеӯ—е№•ж–Үд»¶</button>
      <div id="vttDiagOutput" class="output" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>3пёҸвғЈ жөӢиҜ• Fetch иҜ·жұӮ</h2>
      <button onclick="testFetch()">рҹҢҗ жөӢиҜ• Fetch иҜ·жұӮ</button>
      <div id="fetchTestOutput" class="output" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>4пёҸвғЈ VTT и§ЈжһҗжөӢиҜ•</h2>
      <button onclick="parseAndPreviewVTT()">рҹ”Ө и§Јжһҗе’Ңйў„и§Ҳ VTT</button>
      <div id="parseOutput" class="output" style="display:none;"></div>
      <div id="vttPreview" class="vtt-preview" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>5пёҸвғЈ еёёи§Ғй—®йўҳжҺ’жҹҘ</h2>
      <button onclick="fullDiagnosis()">рҹҸҘ е®Ңж•ҙиҜҠж–ӯ</button>
      <div id="diagOutput" class="output" style="display:none;"></div>
    </div>
  </div>

  <script>
    const log = (msg, type = 'info') => {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = {
        'success': 'вң…',
        'error': 'вқҢ',
        'warning': 'вҡ пёҸ',
        'info': 'в„№пёҸ'
      }[type] || 'вҖў';
      return `[${timestamp}] ${prefix} ${msg}`;
    };

    async function checkAvailableFiles() {
      const output = document.getElementById('fileCheckOutput');
      output.style.display = 'block';
      output.innerHTML = log('ејҖе§ӢжЈҖжҹҘеҸҜз”Ёж–Үд»¶...') + '\n';

      const files = ['audio_1.mp3', 'audio_1.vtt', 'audio_1_еүҜжң¬.vtt', 'news_1.mp3', 'news_1.vtt', 'news_2.vtt'];
      const results = [];

      for (const file of files) {
        try {
          const res = await fetch(file, { method: 'HEAD' });
          if (res.ok) {
            results.push(log(`вң“ ж–Үд»¶еӯҳеңЁ: ${file}`, 'success'));
          } else {
            results.push(log(`вң— ж–Үд»¶дёҚеӯҳеңЁ (HTTP ${res.status}): ${file}`, 'error'));
          }
        } catch (e) {
          results.push(log(`вң— ж— жі•и®ҝй—®: ${file} - ${e.message}`, 'error'));
        }
      }

      output.innerHTML += results.join('\n');
    }

    async function diagnoseVttFile() {
      const vttFile = document.getElementById('vttFile').value.trim();
      const output = document.getElementById('vttDiagOutput');
      output.style.display = 'block';
      output.innerHTML = log(`иҜҠж–ӯж–Үд»¶: ${vttFile || '(жңӘжҢҮе®ҡ)'}\n`) + '\n';

      if (!vttFile) {
        output.innerHTML += log('иҜ·иҫ“е…Ҙеӯ—е№•ж–Үд»¶и·Ҝеҫ„', 'warning');
        return;
      }

      try {
        // 1. жЈҖжҹҘж–Үд»¶жҳҜеҗҰеӯҳеңЁ
        output.innerHTML += log('жЈҖжҹҘж–Үд»¶жҳҜеҗҰеӯҳеңЁ...') + '\n';
        const headRes = await fetch(vttFile, { method: 'HEAD' });
        if (!headRes.ok) {
          output.innerHTML += log(`ж–Үд»¶дёҚеӯҳеңЁ (HTTP ${headRes.status})`, 'error') + '\n';
          return;
        }
        output.innerHTML += log(`ж–Үд»¶еӯҳеңЁ (HTTP ${headRes.ok ? 200 : headRes.status})`, 'success') + '\n';

        // 2. иҺ·еҸ–ж–Үд»¶еҶ…е®№
        output.innerHTML += log('иҺ·еҸ–ж–Үд»¶еҶ…е®№...') + '\n';
        const res = await fetch(vttFile);
        const text = await res.text();
        output.innerHTML += log(`жҲҗеҠҹиҜ»еҸ– ${text.length} еӯ—з¬Ұ`, 'success') + '\n';

        // 3. йӘҢиҜҒ VTT ж јејҸ
        output.innerHTML += log('йӘҢиҜҒ VTT ж јејҸ...') + '\n';
        if (!text.includes('WEBVTT')) {
          output.innerHTML += log('вҡ пёҸ иӯҰе‘Ҡ: ж–Үд»¶дёҚеҢ…еҗ« WEBVTT ж Үи®°', 'warning') + '\n';
        } else {
          output.innerHTML += log('вң“ ж–Үд»¶еҢ…еҗ« WEBVTT ж Үи®°', 'success') + '\n';
        }

        // 4. з»ҹи®Ўеӯ—е№•жқЎзӣ®
        const lines = text.split('\n');
        const subtitleCount = lines.filter(line => line.includes('-->')).length;
        output.innerHTML += log(`жүҫеҲ° ${subtitleCount} жқЎеӯ—е№•`, 'info') + '\n';

        // 5. жЈҖжҹҘзј–з Ғ
        const decoder = new TextDecoder();
        output.innerHTML += log('ж–Үд»¶зј–з ҒжЈҖжөӢ: UTF-8', 'info') + '\n';

      } catch (e) {
        output.innerHTML += log(`й”ҷиҜҜ: ${e.message}`, 'error') + '\n';
        output.innerHTML += log(`й”ҷиҜҜзұ»еһӢ: ${e.name}`, 'error') + '\n';
      }
    }

    async function testFetch() {
      const vttFile = document.getElementById('vttFile').value.trim() || 'audio_1.vtt';
      const output = document.getElementById('fetchTestOutput');
      output.style.display = 'block';
      output.innerHTML = log('жөӢиҜ• Fetch иҜ·жұӮ...') + '\n\n';

      try {
        output.innerHTML += log(`е°қиҜ•и®ҝй—®: ${vttFile}`) + '\n';
        const res = await fetch(vttFile);
        output.innerHTML += log(`HTTP зҠ¶жҖҒ: ${res.status} ${res.statusText}`, 'info') + '\n';
        output.innerHTML += log(`Content-Type: ${res.headers.get('content-type')}`, 'info') + '\n';
        output.innerHTML += log(`Content-Length: ${res.headers.get('content-length')} bytes`, 'info') + '\n';

        if (res.ok) {
          const text = await res.text();
          output.innerHTML += log(`вң“ жҲҗеҠҹиҜ»еҸ–ж–Үд»¶пјҢеӨ§е°Ҹ: ${text.length} еӯ—з¬Ұ`, 'success') + '\n';
          output.innerHTML += log(`ж–Үд»¶ејҖеӨҙ: ${text.substring(0, 100)}...`, 'info') + '\n';
        } else {
          output.innerHTML += log(`вң— иҜ·жұӮеӨұиҙҘ`, 'error') + '\n';
        }
      } catch (e) {
        output.innerHTML += log(`рҹ”ҙ Fetch еӨұиҙҘ`, 'error') + '\n';
        output.innerHTML += log(`й”ҷиҜҜдҝЎжҒҜ: ${e.message}`, 'error') + '\n';
        output.innerHTML += log(`еҸҜиғҪеҺҹеӣ : CORS, зҪ‘з»ңй—®йўҳ, жҲ–ж–Үд»¶дёҚеӯҳеңЁ`, 'warning') + '\n';
      }
    }

    async function parseAndPreviewVTT() {
      const vttFile = document.getElementById('vttFile').value.trim() || 'audio_1.vtt';
      const parseOutput = document.getElementById('parseOutput');
      const vttPreview = document.getElementById('vttPreview');
      parseOutput.style.display = 'block';
      vttPreview.style.display = 'block';
      parseOutput.innerHTML = log('ејҖе§Ӣи§Јжһҗ VTT...') + '\n\n';
      vttPreview.innerHTML = '';

      try {
        const res = await fetch(vttFile);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        // з®ҖеҚ•зҡ„ VTT и§Јжһҗ
        const lines = text.trim().split(/\n+/);
        const subtitles = [];
        let i = 0;

        // и·іиҝҮ WEBVTT ж Үи®°
        while (i < lines.length && !lines[i].includes('-->')) i++;

        // и§Јжһҗеӯ—е№•
        for (; i < lines.length;) {
          const timeLine = lines[i];
          if (!timeLine.includes('-->')) { i++; continue; }

          const [startStr, endStr] = timeLine.split('-->').map(x => x.trim());
          i++;
          let en = '', zh = '';
          if (i < lines.length) { en = lines[i].trim(); i++; }
          if (i < lines.length) { zh = lines[i].trim(); i++; }

          if (en || zh) {
            subtitles.push({ time: timeLine, en, zh });
          }
        }

        parseOutput.innerHTML += log(`вң“ жҲҗеҠҹи§Јжһҗ ${subtitles.length} жқЎеӯ—е№•`, 'success') + '\n\n';

        // йў„и§ҲеүҚ 5 жқЎ
        let previewHtml = '<div style="margin-bottom: 20px;"><strong>еүҚ 5 жқЎеӯ—е№•йў„и§Ҳпјҡ</strong></div>';
        subtitles.slice(0, 5).forEach((sub, idx) => {
          previewHtml += `
            <div class="vtt-line">
              <div class="vtt-timestamp">[${idx + 1}] ${sub.time}</div>
              <div class="vtt-en">рҹҮ¬рҹҮ§ ${sub.en}</div>
              <div class="vtt-zh">рҹҮЁрҹҮі ${sub.zh}</div>
            </div>
          `;
        });
        vttPreview.innerHTML = previewHtml;

      } catch (e) {
        parseOutput.innerHTML += log(`вң— и§ЈжһҗеӨұиҙҘ: ${e.message}`, 'error') + '\n';
      }
    }

    async function fullDiagnosis() {
      const output = document.getElementById('diagOutput');
      output.style.display = 'block';
      output.innerHTML = '';

      const addLog = (msg, type = 'info') => {
        output.innerHTML += log(msg, type) + '\n';
      };

      addLog('рҹҸҘ ејҖе§Ӣе®Ңж•ҙиҜҠж–ӯ...\n', 'info');

      // 1. зҺҜеўғжЈҖжҹҘ
      addLog('в•җ' + 'в•җ'.repeat(50), 'info');
      addLog('1пёҸвғЈ  зҺҜеўғжЈҖжҹҘ', 'info');
      addLog('в•җ' + 'в•җ'.repeat(50), 'info');
      addLog(`жөҸи§ҲеҷЁ: ${navigator.userAgent.substring(0, 50)}...`, 'info');
      addLog(`еҪ“еүҚ URL: ${window.location.href}`, 'info');
      addLog(`еҚҸи®®: ${window.location.protocol}`, 'info');

      // 2. жЈҖжҹҘе…ій”®ж–Үд»¶
      addLog('\nв•җ' + 'в•җ'.repeat(50), 'info');
      addLog('2пёҸвғЈ  е…ій”®ж–Үд»¶жЈҖжҹҘ', 'info');
      addLog('в•җ' + 'в•җ'.repeat(50), 'info');

      const criticalFiles = ['audio_1.mp3', 'audio_1.vtt', 'news_1.mp3'];
      for (const file of criticalFiles) {
        try {
          const res = await fetch(file, { method: 'HEAD' });
          if (res.ok) {
            addLog(`вң“ ${file}`, 'success');
          } else {
            addLog(`вң— ${file} (HTTP ${res.status})`, 'error');
          }
        } catch (e) {
          addLog(`вң— ${file} - ${e.message}`, 'error');
        }
      }

      // 3. жөӢиҜ• localStorage
      addLog('\nв•җ' + 'в•җ'.repeat(50), 'info');
      addLog('3пёҸвғЈ  localStorage жЈҖжҹҘ', 'info');
      addLog('в•җ' + 'в•җ'.repeat(50), 'info');
      try {
        localStorage.setItem('test', 'ok');
        localStorage.removeItem('test');
        addLog('вң“ localStorage еҸҜз”Ё', 'success');
        const bbcList = localStorage.getItem('bbcNewsList');
        if (bbcList) {
          const data = JSON.parse(bbcList);
          addLog(`вң“ жүҫеҲ° ${data.length} жқЎж–°й—»и®°еҪ•`, 'success');
          if (data[0]) {
            addLog(`  - ж Үйўҳ: ${data[0].name}`, 'info');
            addLog(`  - йҹійў‘: ${data[0].audio}`, 'info');
            addLog(`  - еӯ—е№•: ${data[0].sub || '(жңӘжҢҮе®ҡ)'}`, 'warning');
          }
        }
      } catch (e) {
        addLog(`вң— localStorage й”ҷиҜҜ: ${e.message}`, 'error');
      }

      // 4. е»әи®®
      addLog('\nв•җ' + 'в•җ'.repeat(50), 'info');
      addLog('4пёҸвғЈ  е»әи®®', 'info');
      addLog('в•җ' + 'в•җ'.repeat(50), 'info');
      addLog('еҰӮжһңеӯ—е№•д»ҚжңӘеҠ иҪҪ:', 'warning');
      addLog('  1. жЈҖжҹҘжөҸи§ҲеҷЁжҺ§еҲ¶еҸ°зҡ„зҪ‘з»ңй”ҷиҜҜ (F12)', 'info');
      addLog('  2. зЎ®дҝқ VTT ж–Үд»¶дёҺ HTML еңЁеҗҢдёҖзӣ®еҪ•', 'info');
      addLog('  3. е°қиҜ•жң¬ең°жңҚеҠЎеҷЁиҝҗиЎҢ (йҒҝе…Қ CORS й—®йўҳ)', 'info');
      addLog('  4. жЈҖжҹҘж–Үд»¶еҗҚеӨ§е°ҸеҶҷжҳҜеҗҰжӯЈзЎ®', 'info');
    }
  </script>
</body>
</html>
